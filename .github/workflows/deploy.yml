name: Deploy site

# Build and publish the static map to GitHub Pages whenever site code or committed
# data changes on main. The weekly recrawl deploys itself, and its data commit (made
# with GITHUB_TOKEN) does not trigger this workflow, so there is no double deploy.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
      - ".github/actions/build-deploy/action.yml"
  workflow_dispatch: {}

# Serialize with the recrawl workflow so two Pages deployments never overlap.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.site.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy site
        id: site
        uses: ./.github/actions/build-deploy
