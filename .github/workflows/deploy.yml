name: Deploy site

# Build and publish the static map to GitHub Pages whenever site code or committed
# data changes on main. The weekly recrawl deploys itself, and its data commit (made
# with GITHUB_TOKEN) does not trigger this workflow, so there is no double deploy.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Serialize with the recrawl workflow so two Pages deployments never overlap.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build site
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
